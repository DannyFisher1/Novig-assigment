services:
  core:
    build: .
    ports:
      - "8000:8000"
    command: uv run uvicorn core.app:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  replica:
    build: .
    ports:
      - "8001:8001"
    command: uv run uvicorn replica.app:app --host 0.0.0.0 --port 8001
    environment:
      - CORE_URL=http://core:8000
    depends_on:
      core:
        condition: service_healthy
